name: Add Godlike Server Time

on:
  # 允许在 Actions 页面手动触发此工作流，方便测试
  workflow_dispatch:

  #schedule:
    # 每小时的第20分钟执行一次（UTC 时间）
    # 例如：00:20, 01:20, 02:20, 03:20, ...
    #- cron: '20 * * * *'

jobs:
  godlike_add_time_job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write
    # 由于脚本现在是单次运行，不再需要长时间的 timeout
    # 设置一个合理的超时，例如10分钟，防止意外卡死
    timeout-minutes: 10

    steps:
      - name: Free Disk Space
        run: |
          echo "清理前磁盘空间:"
          df -h
          
          echo "删除不必要的文件..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          
          echo "清理后磁盘空间:"
          df -h

      - name: Checkout private script repository
        uses: actions/checkout@v4
        with:
          repository: huanzhiyi/some-atuo-renew  # 私有仓库地址
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 尝试从 requirements 文件安装（如果存在）
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements_playwright.txt ]; then
            pip install -r requirements_playwright.txt
          else
            # 手动安装依赖
            pip install --default-timeout=300 --retries 3 playwright requests --no-cache-dir
          fi

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Time Adder Script
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Shanghai
        # 使用 -u 参数禁用输出缓冲，确保日志实时显示
        run: python -u godlike_auto_renew.py

      - name: Upload error artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7
          if-no-files-found: ignore

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S UTC')
            
            if [ "${{ job.status }}" == "success" ]; then
              MESSAGE="✅ Godlike 服务器续期成功%0A%0A🕐 执行时间: ${TIMESTAMP}%0A🔗 服务器: ${{ secrets.SERVER_URL }}%0A📊 运行编号: #${{ github.run_number }}"
            else
              MESSAGE="❌ Godlike 服务器续期失败%0A%0A🕐 执行时间: ${TIMESTAMP}%0A🔗 服务器: ${{ secrets.SERVER_URL }}%0A📊 运行编号: #${{ github.run_number }}%0A%0A请检查 GitHub Actions 日志"
            fi
            
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MESSAGE}" \
              -d "parse_mode=HTML"
            
            echo "✅ Telegram 通知已发送"
          else
            echo "⚠️ 未配置 Telegram，跳过通知"
          fi

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
