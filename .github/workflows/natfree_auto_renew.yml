name: FreeCloud Auto Renew

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      login_url:
        description: 'Login URL (override secret)'
        required: false
        type: string

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: huanzhiyi/some-atuo-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-natfree-${{ runner.os }}-py311-v1
          restore-keys: |
            pip-natfree-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "seleniumbase>=4.0.0" \
            "ddddocr>=1.4.0" \
            "requests>=2.28.0" \
            "Pillow>=10.0.0"

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          echo "[INFO] Installed Chrome:"
          which google-chrome || which chromium-browser || true

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sleep 2
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo

      - name: Run renew script
        env:
          CI: true
          NATFREE_LOGIN_URL: ${{ inputs.login_url || secrets.NATFREE_LOGIN_URL }}
          NATFREE_EMAIL: ${{ secrets.NATFREE_EMAIL }}
          NATFREE_PASSWORD: ${{ secrets.NATFREE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENABLE_WARP: ${{ secrets.ENABLE_WARP || 'true' }}
        run: python natfree_auto_renew.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
