name: FreeCloud Auto Renew

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      login_url:
        description: 'Login URL (override secret)'
        required: false
        type: string

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: huanzhiyi/some-atuo-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-natfree-${{ runner.os }}-py311-v1
          restore-keys: |
            pip-natfree-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "seleniumbase>=4.0.0" "ddddocr>=1.4.0" "requests>=2.28.0" "Pillow>=10.0.0"

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
          google-chrome --version || chromium-browser --version || true

      - name: Install chromedriver
        run: |
          seleniumbase install chromedriver
          echo "[INFO] chromedriver installed"

      - name: Install Hysteria2
        if: secrets.HY2_URL != ''
        run: |
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria2
          chmod +x hysteria2
          echo "[INFO] Hysteria2 installed"

      - name: Start Hysteria2 proxy
        if: secrets.HY2_URL != ''
        run: |
          nohup ./hysteria2 client --http :7890 "${{ secrets.HY2_URL }}" > hysteria2.log 2>&1 &
          sleep 6
          cat hysteria2.log || true
          curl -x http://127.0.0.1:7890 --max-time 10 https://api.ipify.org && echo "[OK]" || echo "[WARN] Proxy not working"

      - name: Run renew script
        env:
          CI: true
          NATFREE_LOGIN_URL: ${{ inputs.login_url || secrets.NATFREE_LOGIN_URL }}
          NATFREE_EMAIL: ${{ secrets.NATFREE_EMAIL }}
          NATFREE_PASSWORD: ${{ secrets.NATFREE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_SERVER: ${{ secrets.HY2_URL && 'http://127.0.0.1:7890' || '' }}
        run: python natfree_auto_renew.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7

      - name: Cleanup workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
