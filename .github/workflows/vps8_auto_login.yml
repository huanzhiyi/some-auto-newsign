name: VPS8 Auto Login

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      login_url:
        description: 'Login URL (override secret)'
        required: false
        type: string

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: huanzhiyi/some-atuo-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-vps8-${{ runner.os }}-py311-v1
          restore-keys: |
            pip-vps8-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir \
            "requests>=2.28.0" \
            "hcaptcha-challenger>=0.19.0" \
            "playwright>=1.30.0" \
            "pyyaml>=6.0"
          python -m playwright install chromium

      - name: Install fonts for Chinese rendering
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei
          fc-cache -f

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          if [ -z "$HY2_URL" ]; then
            echo "INFO: 无代理配置，使用直连模式"
            exit 0
          fi

          echo "INFO: 配置 Hysteria2 代理"
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria2
          chmod +x hysteria2

          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")

          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:1080
          EOF

          ./hysteria2 client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3
          echo "PROXY_SERVER=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "INFO: 代理已启动"

      - name: Fix DNS
        run: |
          echo "[INFO] Stop systemd-resolved, set public DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS test:"
          nslookup vps8.zz.cd 1.1.1.1 || echo "[WARN] resolve failed"

      - name: Verify dependencies
        run: |
          python -c "
          import importlib.metadata
          print('playwright:', importlib.metadata.version('playwright'))
          "

      - name: Run login script
        env:
          CI: true
          VPS8_URL: ${{ inputs.login_url || secrets.VPS8_URL || secrets.LOGIN_URL }}
          VPS8_EMAIL: ${{ secrets.VPS8_EMAIL || secrets.EMAIL }}
          VPS8_PASSWORD: ${{ secrets.VPS8_PASSWORD || secrets.PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
        run: python vps8_login.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ github.run_number }}
          path: "*.png"
          retention-days: 7

      - name: Clean up workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
