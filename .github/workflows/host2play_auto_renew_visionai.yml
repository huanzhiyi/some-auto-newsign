name: Host2Play Auto Renew (VisionAI)

on:
  schedule:
    - cron: '0 */7 * * *'
  workflow_dispatch:
    inputs:
      renew_url:
        description: 'Renew URL (override secret)'
        required: false
        type: string

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: huanzhiyi/some-atuo-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-visionai-${{ runner.os }}-py311-v1
          restore-keys: |
            pip-visionai-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "playwright>=1.40.0" \
            "Pillow>=10.0.0" \
            "requests>=2.28.0" \
            "httpx>=0.25.0" \
            "opencv-python-headless>=4.8.0" \
            "numpy>=1.24.0" \
            "ultralytics>=8.3.0" \
            "huggingface-hub>=0.20.0" \
            "onnxruntime>=1.16.0" \
            "vision-ai-recaptcha-solver>=1.0.0" \
            "tenacity>=8.0.0" \
            "aiohttp>=3.9.0" \
            "click>=8.1.0"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: Verify dependencies
        run: |
          python -c "
          from ultralytics import YOLO
          import importlib.metadata
          print('ultralytics OK')
          print('playwright:', importlib.metadata.version('playwright'))
          "

      - name: Detect Chromium path
        id: chromium
        run: |
          CHROMIUM_PATH=$(find ~/.cache/ms-playwright -name "chrome" -type f 2>/dev/null | head -1)
          if [ -z "$CHROMIUM_PATH" ]; then
            CHROMIUM_PATH=$(which google-chrome 2>/dev/null || which chromium 2>/dev/null || echo "")
          fi
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "[INFO] Chromium path: $CHROMIUM_PATH"

      - name: Run renewal script
        env:
          CI: true
          RENEW_URL: ${{ inputs.renew_url || secrets.RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENABLE_WARP: ${{ secrets.ENABLE_WARP || 'true' }}
          BROWSER_PATH: ${{ steps.chromium.outputs.path }}
        run: python host2play_auto_renew_visionai.py

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-log-${{ github.run_number }}
          path: log.txt
          retention-days: 7

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
