name: Host2Play Auto Renew (VisionAI)

on:
  schedule:
    # 每天 UTC 0/6/12/18 点各运行一次
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      renew_url:
        description: 'Renew URL (override secret)'
        required: false
        type: string

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-visionai-${{ runner.os }}-py311-v1
          restore-keys: |
            pip-visionai-${{ runner.os }}-

      - name: Cache YOLO model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ultralytics
            ~/.cache/vision_ai_recaptcha_solver
          key: yolo-model-v1
          restore-keys: |
            yolo-model-

      - name: Cache Camoufox browser
        uses: actions/cache@v4
        with:
          path: ~/.camoufox
          key: camoufox-${{ runner.os }}-v1
          restore-keys: |
            camoufox-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "camoufox[geoip]>=0.4.0" \
            "playwright>=1.40.0" \
            "vision-ai-recaptcha-solver>=1.0.5" \
            "Pillow>=10.0.0" \
            "requests>=2.28.0"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch Camoufox browser
        run: camoufox fetch

      - name: Verify dependencies
        run: |
          python -c "
          from camoufox.async_api import AsyncCamoufox
          from vision_ai_recaptcha_solver.detector.yolo_detector import YOLODetector
          from PIL import Image
          import importlib.metadata
          print('camoufox OK')
          print('vision_ai_recaptcha_solver OK')
          print('playwright:', importlib.metadata.version('playwright'))
          "

      - name: Run renewal script
        env:
          CI: true
          RENEW_URL: ${{ inputs.renew_url || secrets.RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python host2play_auto_renew_visionai.py

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-log-${{ github.run_number }}
          path: log.txt
          retention-days: 7
